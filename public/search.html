<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscador - Patogenos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>

    <!-- Fondo que ocupa toda la pantalla -->
    <div class="page-search-bg"></div>

    <!-- Navbar fijo -->
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="/">Patogenos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
                aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto gap-1">
            <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="/search.html">Buscador</a></li>
            <li class="nav-item"><a class="nav-link" href="/admin.html">Admin</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Contenido principal -->
    <div class="search-wrapper">
      <div class="container px-3">
        <div class="search-card mx-auto">

          <h2>Buscador de Patógenos</h2>

          <!-- Barra de búsqueda -->
          <div class="search-input-group">
            <input
              id="input-buscar"
              list="sugerencias"
              autocomplete="off"
              placeholder="Escribe el nombre de un patógeno…"
            />
            <datalist id="sugerencias"></datalist>
            <button id="btn-buscar" class="btn btn-cerulean">Buscar</button>
          </div>

          <!-- Toggle modo experto -->
          <label class="expert-toggle">
            <input type="checkbox" id="modo-experto" />
            <span>Mostrar información para expertos</span>
          </label>

          <!-- Área de resultados -->
          <div id="resultados"></div>

        </div>
      </div>
    </div>

    <script src="/js/search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
